[package]
name = "superx-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
superx-kernel = { path = "../superx-kernel" }
superx-ingest = { path = "../superx-ingest" }
superx-compiler = { path = "../superx-compiler" }
superx-inference = { path = "../superx-inference" }
superx-harness = { path = "../superx-harness" }
superx-emission = { path = "../superx-emission" }
superx-proposer = { path = "../superx-proposer" }
superx-bootstrap = { path = "../superx-bootstrap" }
superx-agent = { path = "../superx-agent" }
superx-runner = { path = "../superx-runner" }
surrealdb.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
clap = { version = "4.4", features = ["derive", "env"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid.workspace = true
tempfile.workspace = true
async-trait.workspace = true
chrono.workspace = true

[dev-dependencies]
superx-mcp = { path = "../superx-mcp" }
wat = "1"
wiremock = "0.6"
